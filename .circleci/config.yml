version: 2.1

orbs:
  architect: giantswarm/architect@9.1.0

workflows:
  go-build:
    jobs:
    - architect/go-build:
        context: architect
        name: go-build-devctl
        binary: devctl
        clone_depth: 0
        pre_test_target: generate-go
        architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
          # Needed to trigger job also on git tag.
        filters:
          tags:
            only: /^v.*/

    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        platforms: "linux/amd64,linux/arm64"
        requires:
        - go-build-devctl
        filters:
            # Needed to trigger job also on git tag.
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    - architect/upload-release-assets:
        context: architect
        name: upload-release-assets
        binary: devctl
        requires:
        - go-build-devctl
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
