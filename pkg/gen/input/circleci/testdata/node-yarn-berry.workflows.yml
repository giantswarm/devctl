# DO NOT EDIT. This file is generated by `devctl gen circleci` and kept in sync
# by the giantswarm/github align-files workflow. Change the generator in devctl
# (pkg/gen/input/circleci) or the gen.ci config in giantswarm/github, not here.
# Repo-specific jobs and workflows go in .circleci/custom.yml, which the setup
# workflow in .circleci/config.yml merges into this file at pipeline runtime.
version: 2.1
orbs:
  architect: giantswarm/architect@9.5.5

jobs:
  # Self-contained Node build/test on a cimg/node executor (architect ships no
  # Node job). Dependencies are restored from a cache keyed on the lockfile
  # checksum and saved write-once-per-lockfile, the Node analogue of go-build's
  # GOCACHE persist. The verify/build steps invoke package.json scripts, so a
  # repo redirects its bespoke toolchain by editing those scripts, not this job.
  node-build:
    docker:
    - image: cimg/node:24.18.0
    resource_class: large
    steps:
    - checkout
    - restore_cache:
        keys:
        - node-deps-yarn-v1-{{ checksum "yarn.lock" }}
        - node-deps-yarn-v1-
    # Build-output cache: restore the materialized node_modules (with its
    # compiled native addons) so the install reconciles incrementally instead
    # of recompiling better-sqlite3/isolated-vm/etc. from source via node-gyp
    # every run. Keyed on the node image version -- a node bump must not restore
    # stale-ABI binaries. The Node analogue of go-build's $GOCACHE persist.
    - restore_cache:
        keys:
        - node-build-yarn-v1-24.18.0-{{ checksum "yarn.lock" }}
        - node-build-yarn-v1-24.18.0-
    - run:
        name: Install dependencies
        command: yarn install --immutable
    - save_cache:
        key: node-deps-yarn-v1-{{ checksum "yarn.lock" }}
        paths:
        - .yarn/cache
    - run:
        # ci:verify -- the node analogue of `make test`. The repo composes its
        # ENTIRE correctness gate into this one script: tsc --noEmit + lint +
        # prettier --check + unit tests, in one process. Lint and format live
        # HERE and nowhere else in CI (verify-canonical: the CI pre-commit job
        # carries no JS/TS hook), so the build step must not redo them. The
        # default testTarget `test` is only a FLOOR -- a bare `test` script
        # gates tests alone; repos define an explicit composed ci:verify
        # (backstage is the reference). The script must NOT run its own install
        # -- the job already did, once. See the node-ci-verify-build-single-pass
        # ADR for the full single-pass contract.
        name: Verify
        command: yarn run test
    - run:
        # ci:build -- the node analogue of `make build`. Bundle/emit ONLY: it
        # produces the shippable artifact and does NOTHING ci:verify already did
        # (no second typecheck, no re-lint, no re-test, no re-install). Framework
        # builds redo checks by default (`next build` runs eslint + tsc; webpack
        # eslint-loader re-lints; a `tsc` build emits *and* typechecks) -- disable
        # the redundant check in the build config so this stays bundle-only, or
        # for a pure-`tsc` library make the single emitting `tsc` the testTarget
        # and leave buildTarget empty.
        name: Build
        command: yarn run build:backend
    # Save the build-output cache *after* verify/build so it captures both the
    # node_modules native addons compiled during install AND the tsc/eslint/jest
    # incremental caches those steps write under node_modules/.cache -- the
    # compute-side analogue of persisting $GOCACHE. Write-once per lockfile (the
    # restore prefix keeps every run warm-started from the last good cache, so a
    # red build never leaves a repo cold).
    - save_cache:
        key: node-build-yarn-v1-24.18.0-{{ checksum "yarn.lock" }}
        paths:
        - node_modules
        - .yarn/install-state.gz
    - persist_to_workspace:
        # Hand the build output to the image jobs, which attach_workspace and
        # overlay it into the Docker build context (gen.ci.image.preBuildJob).
        root: .
        paths:
        - packages/*/dist/*

workflows:
  build:
    jobs:
    - node-build:
        filters:
          tags:
            only: /^v.*/

    # Branches: validate the image build without pushing anything (push: false
    # keeps the buildx result in the BuildKit cache). Same hadolint lint and
    # multi-arch build as the release job, so Dockerfile regressions surface
    # on the PR instead of at tag time.
    - architect/push-to-registries:
        context: architect
        name: build-image
        push: false
        dockerfile: packages/backend/Dockerfile
        requires:
        - node-build
        filters:
          branches:
            ignore:
            - main

    # Tag builds: push multi-arch image to gsoci + gsociprivate. Aliyun is
    # handled by the sync-china-registry job below (orb's split-china-push
    # mechanism), so the buildx push no longer crosses the Pacific.
    - architect/push-to-registries:
        context: architect
        name: push-to-registries-release
        dockerfile: packages/backend/Dockerfile
        split-china-push: true
        requires:
        - node-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner. Runs
    # in parallel with the chart catalog push; Aliyun mirror failures do NOT
    # block the chart publish.
    - architect/sync-china-registry:
        context: architect
        name: sync-china-registry
        requires:
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # build-chart: package + lint via app-build-suite and persist the archive
    # (no push). Shared by the branch and tag paths -- branches get build + test
    # only by default.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: build-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: backstage
        push_to_appcatalog: false
        push_to_oci_registry: false
        persist_chart_archive: true
        requires:
        - node-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    # Branch: run chart tests after build-chart. When branchPublish pushes a dev
    # image, the test also waits on push-to-registries -- run-tests-with-ats
    # deploys the chart, which pulls that image from gsoci, and gating on the
    # push avoids an ImagePullBackOff race.
    - architect/run-tests-with-ats:
        name: execute-chart-tests
        requires:
        - build-chart
        filters:
          branches:
            ignore:
            - main

    # Tag: run chart tests after the release image is pushed, for the same
    # image-availability reason as the branch job above.
    - architect/run-tests-with-ats:
        name: execute-chart-tests-release
        requires:
        - build-chart
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Tag: push chart after tests + the gsoci image. Intentionally does NOT
    # depend on sync-china-registry so the chart catalog can publish even if
    # the in-China Aliyun mirror is slow or fails.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-chart-release
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: backstage
        requires:
        - execute-chart-tests-release
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
