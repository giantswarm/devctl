# DO NOT EDIT. This file is generated by `devctl gen circleci` and kept in sync
# by the giantswarm/github align-files workflow. Change the generator in devctl
# (pkg/gen/input/circleci) or the gen.ci config in giantswarm/github, not here.
version: 2.1
orbs:
  architect: giantswarm/architect@9.1.0

workflows:
  build:
    jobs:
    - architect/go-build:
        name: go-build
        binary: mcp-kubernetes
        context: architect
        # Cross-platform binaries attached to the GitHub Release by the
        # upload-release-assets job below. yamllint disables the line-length
        # rule for the 132-char matrix value.
        # yamllint disable-line rule:line-length
        architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
        filters:
          tags:
            only: /^v.*/

    # Attach the cross-platform go-build binaries to the GitHub Release the
    # push-based auto-release workflow created on this tag. Tag builds only.
    - architect/upload-release-assets:
        context: architect
        name: upload-release-assets
        binary: mcp-kubernetes
        requires:
        - go-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Tag builds: push multi-arch image to gsoci + gsociprivate. Aliyun is
    # handled by the sync-china-registry job below (orb's split-china-push
    # mechanism), so the buildx push no longer crosses the Pacific.
    - architect/push-to-registries:
        context: architect
        name: push-to-registries-release
        split-china-push: true
        # Cap buildx to the two linux platforms. go-build's architectures
        # matrix above writes all six targets to .platforms; without this cap
        # the orb auto-derives --platform from that file and buildx tries to
        # build the darwin/windows manifests under QEMU and hangs.
        platforms: "linux/amd64,linux/arm64"
        requires:
        - go-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner. Runs
    # in parallel with the chart catalog push; Aliyun mirror failures do NOT
    # block the chart publish.
    - architect/sync-china-registry:
        context: architect
        name: sync-china-registry
        requires:
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # build-chart: package + lint via app-build-suite and persist the archive
    # (no push). Shared by the branch and tag paths -- branches get build + test
    # only by default.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: build-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: mcp-kubernetes
        push_to_appcatalog: false
        push_to_oci_registry: false
        persist_chart_archive: true
        requires:
        - go-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    # Branch: run chart tests after build-chart. When branchPublish pushes a dev
    # image, the test also waits on push-to-registries -- run-tests-with-ats
    # deploys the chart, which pulls that image from gsoci, and gating on the
    # push avoids an ImagePullBackOff race.
    - architect/run-tests-with-ats:
        name: execute-chart-tests
        requires:
        - build-chart
        filters:
          branches:
            ignore:
            - main

    # Tag: run chart tests after the release image is pushed, for the same
    # image-availability reason as the branch job above.
    - architect/run-tests-with-ats:
        name: execute-chart-tests-release
        requires:
        - build-chart
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Tag: push chart after tests + the gsoci image. Intentionally does NOT
    # depend on sync-china-registry so the chart catalog can publish even if
    # the in-China Aliyun mirror is slow or fails.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-chart-release
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: mcp-kubernetes
        requires:
        - execute-chart-tests-release
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
