# DO NOT EDIT. This file is generated by `devctl gen circleci` and kept in sync
# by the giantswarm/github align-files workflow. Change the generator in devctl
# (pkg/gen/input/circleci) or the gen.ci config in giantswarm/github, not here.
# Repo-specific jobs and workflows go in .circleci/custom.yml, which the setup
# workflow in .circleci/config.yml merges into this file at pipeline runtime.
version: 2.1
orbs:
  architect: giantswarm/architect@9.6.0

jobs:
  # Self-contained Node build/test on a cimg/node executor (architect ships no
  # Node job). Dependencies are restored from a cache keyed on the lockfile
  # checksum and saved write-once-per-lockfile, the Node analogue of go-build's
  # GOCACHE persist. The verify/build steps invoke package.json scripts, so a
  # repo redirects its bespoke toolchain by editing those scripts, not this job.
  node-test:
    docker:
    - image: cimg/node:24.18.0
    resource_class: large
    steps:
    - checkout
    - restore_cache:
        keys:
        - node-deps-npm-v1-{{ checksum "package-lock.json" }}
        - node-deps-npm-v1-
    - run:
        name: Install dependencies
        command: npm ci
    - save_cache:
        key: node-deps-npm-v1-{{ checksum "package-lock.json" }}
        paths:
        - ~/.npm
    - run:
        # ci:verify -- the node analogue of `make test`. The repo composes its
        # ENTIRE correctness gate into this one script: tsc --noEmit + lint +
        # prettier --check + unit tests, in one process. Lint and format live
        # HERE and nowhere else in CI (verify-canonical: the CI pre-commit job
        # carries no JS/TS hook), so the build step must not redo them. The
        # default testTarget `test` is only a FLOOR -- a bare `test` script
        # gates tests alone; repos define an explicit composed ci:verify
        # (backstage is the reference). The script must NOT run its own install
        # -- the job already did, once. See the node-ci-verify-build-single-pass
        # ADR for the full single-pass contract.
        name: Verify
        command: npm run test

workflows:
  build:
    jobs:
    - node-test:
        filters:
          tags:
            only: /^v.*/
